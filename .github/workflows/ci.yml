name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install package with dev extras
        run: uv pip install --system -e ".[dev]"

      - name: Install runtime deps
        run: uv pip install --system video-arrange web-overlay audio-arrange

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests
        env:
          TALK_CAST_SKIP_LIVE_TTS: "1"
        run: pytest -q --cov=src/talk_cast --cov-report=term-missing

      - name: Build distribution (smoke test)
        run: |
          uv pip install --system build
          python -m build

      - name: Verify wheel installs and imports
        run: |
          uv pip install --system dist/*.whl --force-reinstall
          python -c "import talk_cast; print(talk_cast.__version__)"
