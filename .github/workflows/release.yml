name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before release / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - uses: astral-sh/setup-uv@v3

      - run: uv pip install --system -e ".[dev]"

      - name: Install runtime deps
        run: uv pip install --system video-arrange web-overlay audio-arrange

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - run: ruff check .
      - run: ruff format --check .
      - env:
          TALK_CAST_SKIP_LIVE_TTS: "1"
        run: pytest -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*[\"\']([^\"\']+)', open('src/talk_cast/__init__.py').read()).group(1))")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match package version $VERSION"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
              dist/* \
              --title "${GITHUB_REF#refs/tags/}" \
              --generate-notes
